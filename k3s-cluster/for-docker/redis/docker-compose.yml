    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - redis-node-3-data:/data
    ports:
      - "6373:6379"
    networks:
      - redis-cluster-net

  redis-node-4:
    image: redis:latest
    container_name: redis-node-4
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
