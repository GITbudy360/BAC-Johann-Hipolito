version: '3.8'

# NODES

services:
  redis-node-1:
    image: redis:latest
    container_name: redis-node-1
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - redis-node-1-data:/data
    ports:
      - "6371:6379"
    networks:
      - redis-cluster-net

  redis-node-2:
    image: redis:latest
    container_name: redis-node-2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - redis-node-2-data:/data
    ports:
      - "6372:6379"
    networks:
      - redis-cluster-net

  redis-node-3:
