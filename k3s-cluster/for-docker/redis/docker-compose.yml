    ports:
      - "6374:6379"
    networks:
      - redis-cluster-net

  redis-node-5:
    image: redis:latest
    container_name: redis-node-5
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - redis-node-5-data:/data
    ports:
      - "6375:6379"
    networks:
      - redis-cluster-net

  redis-node-6:
    image: redis:latest
    container_name: redis-node-6
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - redis-node-6-data:/data
    ports:
      - "6376:6379"
    networks:
      - redis-cluster-net

# NETWORKING

networks:
  redis-cluster-net:
    driver: bridge

volumes:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-node-6-data: